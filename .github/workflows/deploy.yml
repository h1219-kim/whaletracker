name: 데이터 수집 및 GitHub Pages 배포

on:
  schedule:
    - cron: "40 9 * * *"     # 매일 18:40 KST (09:40 UTC) — 장 마감·공시 반영 후
  workflow_dispatch: {}       # Actions 탭에서 수동 실행
  push:
    branches: [main, master]  # 코드/데이터 push 시 재배포

permissions:
  contents: read
  pages: write
  id-token: write

# 배포는 한 번에 하나만 (동시 실행 방지)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      # GitHub 러너(해외 IP)에서 일부 한국 소스가 막혀도 저장소에 커밋된
      # 마지막 데이터로 사이트를 굽는다 (그래서 실패해도 계속 진행).
      - name: 데이터 수집
        run: python -m nps_fetcher --days 180 --max-new 300
        continue-on-error: true

      - name: 정적 사이트 빌드
        run: python build_static.py

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
